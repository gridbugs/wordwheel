<meta charset="utf-8">
<title>Word Wheel</title>
<style>

  #wheel {
    position: relative;
    top: 0;
    left: 0;
    width: 100vmin;
    height: 100vmin;
  }
  .letter {
    position: absolute;
    font-size: 10vmin;
    font-family: sans-serif;
    width: 100px;
    height: 100px;
    line-height: 100px;
    text-align: center;
  }
  .letter span {
    display: inline-block;
    vertical-align: middle;
  }
  #input {
    font-size: 48pt;
    top: 0;
    left: 0;
    width: 100%;
  }
  .container {
    display: flex;
    justify-content: space-around;
    align-items: center;
  }
  body {
    margin: 0;
  }
  #refresh {
    position: absolute;
    height: 10vmin;
    width: 10vmin;
    filter: invert(0.5);
  }
</style>
<input id="input"/>
<div class="container">
  <div id="wheel"></div>
  <img id="refresh" src="refresh.svg">
</div>
<script>

  function shuffleInPlace(data) {
    for (let i = data.length - 1; i >= 1; i -= 1) {
      const index = parseInt(Math.random() * data.length);
      const tmp = data[index];
      data[index] = data[i];
      data[i] = tmp;
    }
  }

  function mkLetter(char, angleRad, containerWidthPx, containerHeightPx) {
    const RADIUS_PERCENTAGE = 33;
    const LETTER_SIZE_PX = 100;
    const mid_x_percentage = RADIUS_PERCENTAGE * Math.cos(angleRad) + 50;
    const mid_y_percentage = RADIUS_PERCENTAGE * Math.sin(angleRad) + 50;
    const left_x_percentage = mid_x_percentage - ((100 * LETTER_SIZE_PX) / (containerWidthPx * 2));
    const top_y_percentage = mid_y_percentage - ((100 * LETTER_SIZE_PX) / (containerHeightPx * 2));
    return `<div class="letter" style="left:${left_x_percentage}%;top:${top_y_percentage}%"><span>${char}</span></div>`;
  }

  class Letters {
    constructor(word) {
      this.word = word;
      this.updateLetterArray();
    }

    updateLetterArray() {
      this.chars = Array.from(this.word.toUpperCase()).filter((c) => {
        return c !== " ";
      });
    }

    setWord(word) {
      if (word !== this.word) {
        this.word = word;
        this.updateLetterArray();
        this.shuffle();
      }
    }

    shuffle() {
      shuffleInPlace(this.chars);
    }

    letterWheelHtmlString(containerWidthPx, containerHeightPx) {
      const stepRad = (Math.PI * 2) / this.chars.length;
      return this.chars.map((char, i) => {
        const angleRad = (i * stepRad) - (Math.PI / 2);
        return mkLetter(char, angleRad, containerWidthPx, containerHeightPx);
      }).join("\n");
    }
  }

  let currentLetters;
  let currentWord;

  function updateWheel() {
    const wheelWidthPx = wheelDiv().offsetWidth;
    const wheelHeightPx = wheelDiv().offsetHeight;
    wheelDiv().innerHTML = currentLetters.letterWheelHtmlString(wheelWidthPx, wheelHeightPx);
  }

  function updateInput(word) {
    input().value = word;
  }

  function updateHash(word) {
    window.location.hash = word;
  }

  function input() {
    return document.querySelector("#input");
  }

  function refreshButton() {
    return document.querySelector("#refresh");
  }

  function hashValue() {
    return decodeURIComponent(window.location.hash.slice(1));
  }

  function wheelDiv() {
    return document.querySelector("#wheel");
  }

  // the contents of the input field is changed
  input().addEventListener("input", () => {
    currentLetters.setWord(input().value);
    updateWheel();
    updateHash(word);
  });

  window.addEventListener('hashchange', () => {
    currentLetters.setWord(hashValue());
    currentLetters.shuffle();
    updateWheel();
  });

  window.addEventListener("resize", (e) => {
    updateWheel();
  });

  refreshButton().addEventListener("click", (e) => {
    currentLetters.shuffle();
    updateWheel();
  });

  let word = "wordwheel";
  if (hashValue() !== "") {
    word = hashValue();
  }
  currentLetters = new Letters(word);
  currentLetters.shuffle();
  updateHash(word);
  updateInput(word);
  updateWheel();
  input().select();
</script>
